version: 1
suite: formualizer-benchmark-v1

profiles:
  core:
    description: >-
      Cross-engine compatibility profile (arithmetic, aggregates, finite ranges,
      simple cross-sheet references).
  formualizer_strength:
    description: >-
      Formualizer-advantaged profile (whole-column refs, dynamic-ish dependency
      stress, structural edit resilience).

engines:
  - id: formualizer_rust_native
  - id: formualizer_wasm_node
  - id: formualizer_python_pyo3
  - id: ironcalc_rust_native
  - id: ironcalc_wasm_node
  - id: ironcalc_python
  - id: hyperformula_node
  - id: python_xlcalculator

# Common operation DSL used by adapters.
# op values: load, evaluate_all, edit_set_value, edit_set_formula,
#            insert_rows, delete_rows, rename_sheet, add_sheet, remove_sheet,
#            evaluate_incremental, read_cells

scenarios:
  - id: headline_100k_single_edit
    name: 100k workbook single-cell incremental recalc
    profile: core
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/headline_100k_single_edit.xlsx
      seed: 1001
      config:
        sheets:
          - name: Sheet1
            rows: 100000
            cols: 3
        layout:
          inputs_column: A
          formula_column: B
          rollup_cell: C1
          formula_pattern: "=A{row}*2"
          rollup_formula: "=SUM(B1:B100000)"
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Sheet1
        row: 50000
        col: 1
        value: 42
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Sheet1!B50000", "Sheet1!C1"]
    verify:
      expected:
        "Sheet1!B50000": 84
      # C1 depends on seeded workbook values; validate by deterministic recompute in adapter.
      formula_checks:
        - cell: "Sheet1!C1"
          type: non_error
    metrics:
      primary:
        - incremental_latency_us_p50
        - incremental_latency_us_p95
        - incremental_latency_us_p99
      secondary:
        - full_eval_ms
        - peak_rss_mb

  - id: chain_100k
    name: Linear dependency chain depth stress
    profile: core
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/chain_100k.xlsx
      seed: 1002
      config:
        sheets:
          - name: Sheet1
            rows: 100000
            cols: 2
        layout:
          seed_cell: A1
          chain_formula_pattern: "=A{prev_row}+1"
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Sheet1
        row: 1
        col: 1
        value: 2
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Sheet1!A100000"]
    verify:
      expected:
        "Sheet1!A100000": 100001
      formula_checks:
        - cell: "Sheet1!A100000"
          type: non_error

  - id: fanout_100k
    name: Massive fan-out single source
    profile: core
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/fanout_100k.xlsx
      seed: 1003
      config:
        sheets:
          - name: Sheet1
            rows: 100000
            cols: 2
        layout:
          source_cell: A1
          dependent_formula_pattern: "=A$1*{row}"
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Sheet1
        row: 1
        col: 1
        value: 3
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Sheet1!B100000"]
    verify:
      formula_checks:
        - cell: "Sheet1!B100000"
          type: non_error

  - id: cross_sheet_mesh
    name: Cross-sheet dependency mesh
    profile: core
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/cross_sheet_mesh.xlsx
      seed: 1004
      config:
        sheets:
          - name: Inputs
            rows: 25000
            cols: 4
          - name: CalcA
            rows: 25000
            cols: 4
          - name: CalcB
            rows: 25000
            cols: 4
        layout:
          calcA_formula_pattern: "=Inputs!A{row}+Inputs!B{row}"
          calcB_formula_pattern: "=CalcA!A{row}*Inputs!C{row}"
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Inputs
        row: 12345
        col: 1
        value: 99
      - op: evaluate_incremental
      - op: read_cells
        cells: ["CalcA!A12345", "CalcB!A12345"]
    verify:
      formula_checks:
        - cell: "CalcA!A12345"
          type: non_error
        - cell: "CalcB!A12345"
          type: non_error

  - id: inc_sparse_dirty_region_1m
    name: Sparse dirty-region locality (1M-row span)
    profile: core
    family: incremental_locality
    tier: comparative
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/inc_sparse_dirty_region_1m.xlsx
      seed: 1008
      config:
        sheets:
          - name: Sheet1
            rows: 1000000
            cols: 4
        layout:
          sparse_blocks:
            start_rows: [1, 125001, 250001, 375001, 500001, 625001, 750001, 875001]
            formulas:
              local_double: "=A{row}*2"
              local_offset: "=B{row}+5"
              local_sum: "=SUM(B{row}:C{row})"
          tail_anchor:
            row: 1000000
            value: 3
            formula: "=A1000000+1"
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Sheet1
        row: 500001
        col: 1
        value: 42
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Sheet1!B500001", "Sheet1!C500001", "Sheet1!D500001", "Sheet1!D875001", "Sheet1!B1000000"]
    verify:
      expected:
        "Sheet1!B500001": 84
        "Sheet1!C500001": 89
        "Sheet1!D500001": 173
        "Sheet1!D875001": 325
        "Sheet1!B1000000": 4
      formula_checks:
        - cell: "Sheet1!D500001"
          type: non_error
        - cell: "Sheet1!D875001"
          type: non_error
    metrics:
      primary:
        - incremental_latency_us_p50
        - incremental_latency_us_p95
        - incremental_latency_us_p99
      secondary:
        - full_eval_ms
        - load_ms
        - peak_rss_mb

  - id: inc_cross_sheet_mesh_3x25k
    name: Cross-sheet selective propagation mesh (3x25k)
    profile: core
    family: incremental_locality
    tier: comparative
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/inc_cross_sheet_mesh_3x25k.xlsx
      seed: 1009
      config:
        sheets:
          - name: Inputs
            rows: 25000
            cols: 3
          - name: CalcA
            rows: 25000
            cols: 1
          - name: CalcB
            rows: 25000
            cols: 1
        layout:
          calcA_formula_pattern: "=Inputs!A{row}+Inputs!B{row}"
          calcB_formula_pattern: "=CalcA!A{row}*Inputs!C{row}"
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Inputs
        row: 12345
        col: 1
        value: 99
      - op: evaluate_incremental
      - op: read_cells
        cells: ["CalcA!A12345", "CalcB!A12345", "CalcB!A12346"]
    verify:
      expected:
        "CalcA!A12345": 24789
        "CalcB!A12345": 148734
        "CalcB!A12346": 259266
      formula_checks:
        - cell: "CalcA!A12345"
          type: non_error
        - cell: "CalcB!A12345"
          type: non_error
        - cell: "CalcB!A12346"
          type: non_error
    metrics:
      primary:
        - incremental_latency_us_p50
        - incremental_latency_us_p95
        - incremental_latency_us_p99
      secondary:
        - full_eval_ms
        - load_ms
        - peak_rss_mb

  - id: lookup_index_match_dense_50k
    name: Dense INDEX/MATCH lookup mesh (50k table)
    profile: core
    family: lookup
    tier: comparative
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/lookup_index_match_dense_50k.xlsx
      seed: 1008
      config:
        sheets:
          - name: Lookup
            rows: 50001
            cols: 3
          - name: Queries
            rows: 20001
            cols: 3
        layout:
          lookup_rows: 50000
          query_rows: 20000
          key_prefix: K
          query_key_stride: 7919
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Lookup
        row: 40001
        col: 2
        value: 777777
      - op: evaluate_incremental
      - op: edit_set_value
        sheet: Queries
        row: 10000
        col: 1
        value: K040001
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Lookup!B40001", "Queries!B2", "Queries!B10000", "Queries!C10000"]
    verify:
      expected:
        "Lookup!B40001": 777777
        "Queries!B2": 777777
        "Queries!B10000": 280007
        "Queries!C10000": 440011
      formula_checks:
        - cell: "Queries!B2"
          type: non_error
        - cell: "Queries!C10000"
          type: non_error
    metrics:
      primary:
        - incremental_latency_us_p50
        - incremental_latency_us_p95
        - incremental_latency_us_p99
      secondary:
        - full_eval_ms
        - load_ms
        - peak_rss_mb

  - id: lookup_cross_sheet_dim_fact
    name: Cross-sheet dimension/fact INDEX/MATCH join
    profile: core
    family: lookup
    tier: comparative
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/lookup_cross_sheet_dim_fact.xlsx
      seed: 1009
      config:
        sheets:
          - name: RegionDim
            rows: 7
            cols: 2
          - name: ProductDim
            rows: 6
            cols: 2
          - name: Facts
            rows: 50001
            cols: 6
          - name: Report
            rows: 5001
            cols: 7
        layout:
          fact_rows: 50000
          report_rows: 5000
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Facts
        row: 12346
        col: 5
        value: 99
      - op: evaluate_incremental
      - op: edit_set_value
        sheet: RegionDim
        row: 4
        col: 2
        value: 19
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Facts!F12346", "Report!B2", "Report!E2", "Report!F2", "Report!G2", "Report!G3"]
    verify:
      expected:
        "Facts!F12346": 297
        "Report!B2": 297
        "Report!E2": 19
        "Report!F2": 6
        "Report!G2": 33858
        "Report!G3": 13680
      formula_checks:
        - cell: "Report!B2"
          type: non_error
        - cell: "Report!G2"
          type: non_error
        - cell: "Report!G3"
          type: non_error
    metrics:
      primary:
        - incremental_latency_us_p50
        - incremental_latency_us_p95
        - incremental_latency_us_p99
      secondary:
        - full_eval_ms
        - load_ms
        - peak_rss_mb

  - id: sparse_whole_column_refs
    name: Sparse sheet with whole-column refs
    profile: formualizer_strength
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/sparse_whole_column_refs.xlsx
      seed: 1005
      config:
        sheets:
          - name: Sheet1
            rows: 1000000
            cols: 3
        layout:
          sparse_fill:
            column: A
            every_n_rows: 1000
            value_pattern: "row_index"
          summary_formula_cell: C1
          summary_formula: "=SUM(A:A)"
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Sheet1
        row: 500001
        col: 1
        value: 7
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Sheet1!C1"]
    verify:
      formula_checks:
        - cell: "Sheet1!C1"
          type: non_error

  - id: sumifs_fact_table_100k
    name: SUMIFS fact-table stress (100k rows, text+numeric lanes)
    profile: formualizer_strength
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/sumifs_fact_table_100k.xlsx
      seed: 1007
      config:
        sheets:
          - name: Facts
            rows: 100000
            cols: 6
          - name: Report
            rows: 1001
            cols: 4
        layout:
          report_rows: 1000
          dimensions:
            regions: [North, South, East, West]
            products: [A, B, C, D, E]
            channels: [Online, Retail, Partner]
          formulas:
            facts_revenue_formula: "=D{row}*E{row}"
            report_sumifs_formula: "=SUMIFS(Facts!$F:$F,Facts!$A:$A,A{row},Facts!$B:$B,B{row},Facts!$C:$C,C{row})"
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Facts
        row: 54321
        col: 4
        value: 99
      - op: evaluate_incremental
      - op: edit_set_value
        sheet: Report
        row: 2
        col: 1
        value: West
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Facts!F54321", "Report!D2", "Report!D500", "Report!D1000"]
    verify:
      expected:
        "Facts!F54321": 2574
      formula_checks:
        - cell: "Report!D2"
          type: non_error
        - cell: "Report!D500"
          type: non_error
        - cell: "Report!D1000"
          type: non_error
    metrics:
      primary:
        - incremental_latency_us_p50
        - incremental_latency_us_p95
        - incremental_latency_us_p99
      secondary:
        - full_eval_ms
        - load_ms
        - peak_rss_mb

  - id: structural_sheet_recovery
    name: Remove/recreate sheet dependency recovery
    profile: formualizer_strength
    source:
      kind: generated
      generator: umya_formualizer_workbook
      workbook_path: benchmarks/corpus/synthetic/structural_sheet_recovery.xlsx
      seed: 1006
      config:
        sheets:
          - name: Sheet1
            rows: 10
            cols: 3
          - name: Sheet2
            rows: 10
            cols: 3
        layout:
          setup:
            - set: "Sheet2!A1=10"
            - formula: "Sheet1!A1==Sheet2!A1"
    operations:
      - op: load
      - op: evaluate_all
      - op: remove_sheet
        sheet: Sheet2
      - op: evaluate_incremental
      - op: add_sheet
        sheet: Sheet2
      - op: edit_set_value
        sheet: Sheet2
        row: 1
        col: 1
        value: 50
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Sheet1!A1"]
    verify:
      formula_checks:
        - cell: "Sheet1!A1"
          type: non_error

  - id: real_finance_model_v1
    name: Real XLSX anchor (finance model)
    profile: core
    source:
      kind: file
      workbook_path: benchmarks/corpus/real/finance_model_v1.xlsx
      notes: >-
        Curated real workbook with SUMIFS/lookups/mixed refs.
        Must include deterministic verification cells.
    operations:
      - op: load
      - op: evaluate_all
      - op: edit_set_value
        sheet: Assumptions
        row: 12
        col: 3
        value: 0.035
      - op: evaluate_incremental
      - op: read_cells
        cells: ["Summary!B8", "Summary!E12", "Cashflow!G24"]
    verify:
      expected_file: benchmarks/corpus/real/finance_model_v1.expected.yaml
    metrics:
      primary:
        - full_eval_ms
        - incremental_latency_us_p50
      secondary:
        - peak_rss_mb
        - load_ms

runs:
  warmup_runs: 5
  measured_runs: 30
  timeout_seconds_per_run: 120
  cpu_affinity: "pin"
  threads:
    - 1
    - max

reporting:
  outputs:
    - json
    - markdown
  summary_tables:
    - headline_incremental_100k
    - core_profile_comparison
    - formualizer_strength_profile
