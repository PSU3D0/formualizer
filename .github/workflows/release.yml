name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-product:
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify product tag versions match manifests
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          python - "${VERSION}" <<'PY'
          import json
          import sys
          import tomllib
          from pathlib import Path

          repo = Path(".")
          tag_version = sys.argv[1]

          def toml_version(path: Path, keys: list[str]) -> str:
            data = tomllib.loads(path.read_text(encoding="utf-8"))
            cur = data
            for k in keys:
              cur = cur[k]
            return str(cur)

          def json_version(path: Path) -> str:
            data = json.loads(path.read_text(encoding="utf-8"))
            return str(data["version"])

          checks = [
            ("crates/formualizer/Cargo.toml", lambda p: toml_version(p, ["package", "version"])),
            ("bindings/python/pyproject.toml", lambda p: toml_version(p, ["project", "version"])),
            ("bindings/wasm/package.json", json_version),
          ]

          failures: list[str] = []
          for rel, reader in checks:
            path = repo / rel
            actual = reader(path)
            if actual != tag_version:
              failures.append(f"{rel}: {actual} != {tag_version}")

          if failures:
            print("Tag/version mismatch:\n" + "\n".join(failures))
            raise SystemExit(1)

          print(f"OK: v{tag_version} matches product manifests")
          PY

  build-wheels:
    needs: verify-product
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
            python-version: "3.11"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
            python-version: "3.12"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
            python-version: "3.13"
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
            python-version: "3.11"
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
            python-version: "3.12"
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
            python-version: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          args: --release --out dist -i python${{ matrix.python-version }}
          sccache: "true"
          manylinux: ${{ matrix.manylinux }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}-py${{ matrix.python-version }}
          path: bindings/python/dist/*.whl

  github-release:
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Create GitHub Release with wheels
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: dist/*.whl
