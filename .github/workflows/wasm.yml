name: WASM

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check portable-wasm facade
        run: |
          cargo check \
            -p formualizer \
            --no-default-features \
            --features portable-wasm \
            --target wasm32-unknown-unknown

      - name: Check core crates individually (portable no-default-features)
        run: |
          for crate in formualizer-eval formualizer-workbook formualizer-sheetport; do
            echo "--- checking $crate ---"
            cargo check -p "$crate" --no-default-features --target wasm32-unknown-unknown
          done

      - name: Verify portable-wasm dependency profile
        run: scripts/check-wasm-profiles.sh portable

      - name: Build portable wasm probe artifact
        run: |
          cargo build \
            --manifest-path tools/wasm-portable-probe/Cargo.toml \
            --target wasm32-unknown-unknown \
            --release

      - name: Verify portable wasm probe has no JS/browser imports
        run: |
          python3 scripts/check-wasm-artifact-imports.py \
            portable \
            tools/wasm-portable-probe/target/wasm32-unknown-unknown/release/formualizer_wasm_portable_probe.wasm

      - name: Check wasm-js facade
        run: |
          cargo check \
            -p formualizer \
            --no-default-features \
            --features wasm-js \
            --target wasm32-unknown-unknown

      - name: Check formualizer-wasm binding (browser profile)
        run: cargo check -p formualizer-wasm --target wasm32-unknown-unknown

      - name: Verify wasm-js dependency profile
        run: scripts/check-wasm-profiles.sh wasm-js

      - name: Build WASM package (bundler target)
        working-directory: bindings/wasm
        run: |
          wasm-pack build --target bundler --out-dir pkg --release
          rm -f pkg/.gitignore

      - name: Install JS dependencies
        working-directory: bindings/wasm
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build TS wrapper
        working-directory: bindings/wasm
        run: pnpm run build:ts

      - name: Run WASM tests (Node)
        working-directory: bindings/wasm
        run: wasm-pack test --node

      - name: Upload WASM pkg
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: bindings/wasm/pkg
          if-no-files-found: error
